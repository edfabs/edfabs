{% extends "mundial/base.html" %}
{% block title %}Editar Partido{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header fw-bold bg-primary text-white">
        <i class="bi bi-pencil"></i> Editar Partido
      </div>
      <div class="card-body">
        <h5 class="mb-3 text-muted">{{ match }}</h5>
        <form method="post" novalidate>
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-3">
              <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}<div class="invalid-feedback d-block">{{ field.errors.0 }}</div>{% endif %}
            </div>
          {% endfor %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-mundial"><i class="bi bi-save"></i> Guardar</button>
            <a href="{% url 'mundial:admin_matches' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
