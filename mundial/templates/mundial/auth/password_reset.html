{% extends "mundial/base.html" %}
{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="fw-bold mb-3"><i class="bi bi-key text-primary"></i> Recuperar Contraseña</h4>
      <p class="text-muted">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="id_email">Correo electrónico</label>
          <input type="email" name="email" id="id_email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-mundial w-100">
          <i class="bi bi-send"></i> Enviar Enlace
        </button>
      </form>
      <div class="mt-3 text-center small">
        <a href="{% url 'mundial:login' %}">Volver al login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
