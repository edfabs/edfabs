{% extends "mundial/base.html" %}
{% block title %}Reenviar Verificación{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="fw-bold mb-3"><i class="bi bi-envelope-arrow-up text-primary"></i> Reenviar Verificación</h3>
      <p class="text-muted">Ingresa tu correo y te enviaremos un nuevo enlace de verificación.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" for="email">Correo electrónico</label>
          <input type="email" name="email" id="email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-mundial w-100">
          <i class="bi bi-send"></i> Enviar Enlace
        </button>
      </form>
      <div class="mt-3 text-center">
        <a href="{% url 'mundial:login' %}">Volver al login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
