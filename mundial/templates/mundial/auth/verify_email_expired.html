{% extends "mundial/base.html" %}
{% block title %}Enlace Expirado{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card p-5">
      <div style="font-size:4rem;">⏰</div>
      <h3 class="mt-3 fw-bold text-danger">Enlace Expirado</h3>
      <p class="text-muted">El enlace de verificación de email ha expirado (validez: 24 horas).</p>
      <a href="{% url 'mundial:resend_verification' %}" class="btn btn-mundial">
        <i class="bi bi-envelope-arrow-up"></i> Solicitar nuevo enlace
      </a>
    </div>
  </div>
</div>
{% endblock %}
